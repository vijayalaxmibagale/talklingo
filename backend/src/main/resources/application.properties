spring.application.name=backend

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/FREEPDB1}
spring.datasource.username=${DB_USERNAME:talklingo}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

talklingo.translation.provider=mymemory
talklingo.translation.google.api-key=${GOOGLE_TRANSLATE_API_KEY:}
talklingo.translation.google.base-url=${GOOGLE_TRANSLATE_BASE_URL:https://translation.googleapis.com}
talklingo.translation.mymemory.base-url=${MYMEMORY_BASE_URL:https://api.mymemory.translated.net}
talklingo.speech.provider=mock
talklingo.speech.google.base-url=${GOOGLE_SPEECH_BASE_URL:https://speech.googleapis.com}
talklingo.media.base-url=${MEDIA_BASE_URL:https://media.talklingo.local/audio}
